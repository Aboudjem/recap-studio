name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install (strict lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build packages
        # Downstream workspace packages need built dist/ for typecheck to resolve imports.
        run: pnpm -r --if-present run build
      - name: Lint
        run: pnpm -r --if-present run lint
      - name: Typecheck
        run: pnpm -r --if-present run typecheck
      - name: Test
        run: pnpm -r --if-present run test
      - name: Demo + validation
        run: |
          node scripts/demo-latest-ai-models.mjs
          node scripts/validate.mjs
      - name: Render + assert self-contained
        run: |
          node scripts/render-html.mjs latest-ai-models
          F=artifacts/latest-ai-models/recap-latest-ai-models.html
          test -f "$F" || { echo "no HTML produced"; exit 1; }
          if grep -q "/_next/" "$F"; then echo "FAIL: absolute /_next/ path in standalone HTML"; exit 1; fi
          if grep -qi "<script" "$F"; then echo "FAIL: <script> in standalone HTML"; exit 1; fi
          echo "ok: standalone HTML is self-contained (no /_next/, no <script>)"
      - name: CLI smoke
        run: |
          node packages/cli/dist/index.js --version
          node packages/cli/dist/index.js validate fixtures/topics/latest-ai-models.json
          node packages/cli/dist/index.js render fixtures/topics/latest-ai-models.json -o /tmp/cli-out.html
          test -f /tmp/cli-out.html && echo "ok: recap CLI render + validate"

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for leaked secrets / hardcoded keys
        run: |
          # Exclude files that legitimately contain key-SHAPED regexes (the
          # secret scanners themselves) plus build/output dirs.
          PATTERN='(sk-ant-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{30,}|-----BEGIN [A-Z ]*PRIVATE KEY-----|xox[bpars]-[A-Za-z0-9-]{12,})'
          if grep -rnEI "$PATTERN" . \
              --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist \
              --exclude-dir=.next --exclude-dir=out \
              --exclude=pnpm-lock.yaml \
              --exclude=validate.mjs \
              --exclude=security-privacy.ts \
              --exclude=block-secret-writes.mjs ; then
            echo "FAIL: possible secret committed"; exit 1
          fi
          echo "ok: no leaked secrets"

  hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Smoke-test hooks
        run: |
          echo '{"tool_input":{"file_path":".env.local"}}' | node hooks/block-secret-writes.mjs && exit 1 || echo "ok: refused .env"
          echo '{"tool_input":{"command":"git push origin main"}}' | node hooks/block-destructive-git.mjs && exit 1 || echo "ok: refused push"
          echo '{"tool_input":{"command":"vercel --prod"}}' | node hooks/validate-before-deploy.mjs && exit 1 || echo "ok: refused prod deploy with no config"
          echo '{"tool_input":{"command":"ls -la"}}' | node hooks/validate-before-deploy.mjs || exit 1 && echo "ok: allowed non-deploy Bash"
